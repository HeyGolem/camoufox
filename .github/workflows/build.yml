name: Build Camoufox Base Image

# Builds stock Camoufox from source for x86_64 and arm64 concurrently,
# then pushes a multi-arch manifest to ghcr.io/heygolem/camoufox.

on:
  workflow_dispatch:
    inputs:
      camoufox_ref:
        description: 'Camoufox tag to build from'
        required: false
        default: 'v135.0.1-beta.24'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/heygolem/camoufox

jobs:
  build:
    name: Build (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 300
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
            platform: linux/amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64

    steps:
      - name: Maximize build space
        uses: AdityaGarg8/remove-unwanted-software@v4.1
        with:
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'
          remove-cached-tools: 'true'
          remove-swapfile: 'true'

      - name: Remove more packages
        run: |
          sudo apt-get remove -y '^aspnetcore-.*' '^dotnet-.*' '^llvm-.*' \
            'php.*' '^mongodb-.*' '^mysql-.*' azure-cli google-chrome-stable \
            firefox mono-devel libgl1-mesa-dri --fix-missing > /dev/null 2>&1 || true
          sudo apt-get autoremove -y > /dev/null
          sudo apt-get clean > /dev/null

      - name: Create swap
        run: |
          sudo fallocate -l 16G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile

      - name: Check disk space
        run: df -h

      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine version tag
        id: version
        run: |
          REF="${{ github.event.inputs.camoufox_ref || 'v135.0.1-beta.24' }}"
          TAG="${REF#v}"
          echo "ref=${REF}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Building Camoufox ${REF} → ${TAG} (${{ matrix.arch }})"

      - name: Build and push (per-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          build-args: |
            CAMOUFOX_REF=${{ steps.version.outputs.ref }}
          platforms: ${{ matrix.platform }}
          push: true
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache-${{ matrix.arch }}
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache-${{ matrix.arch }},mode=max
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }}-${{ matrix.arch }}

  # Merge per-arch images into a multi-arch manifest
  manifest:
    name: Create multi-arch manifest
    needs: build
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine version tag
        id: version
        run: |
          REF="${{ github.event.inputs.camoufox_ref || 'v135.0.1-beta.24' }}"
          TAG="${REF#v}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Create and push manifest
        run: |
          TAG="${{ steps.version.outputs.tag }}"

          # Use imagetools to combine per-arch manifest lists
          docker buildx imagetools create -t ${{ env.IMAGE_NAME }}:${TAG} \
            ${{ env.IMAGE_NAME }}:${TAG}-x86_64 \
            ${{ env.IMAGE_NAME }}:${TAG}-arm64

          docker buildx imagetools create -t ${{ env.IMAGE_NAME }}:latest \
            ${{ env.IMAGE_NAME }}:${TAG}-x86_64 \
            ${{ env.IMAGE_NAME }}:${TAG}-arm64
